<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>プロットメーカー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0f0a04; --paper:#f5f0e8; --paper2:#ede7d9; --paper3:#e5dece;
  --accent:#7a2008; --accent2:#c4763a; --muted:#5a4a3a;
  --border:#d4c9b0; --hover:#e8e2d4; --active-bg:#ddd5c0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Serif JP',serif;background:var(--paper);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── ヘッダー ── */
.hdr{height:48px;background:var(--ink);color:var(--paper);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;}
.hdr-logo{font-size:13px;letter-spacing:.2em;white-space:nowrap;}
.hdr-link{color:rgba(255,255,255,.85);font-size:11px;text-decoration:none;letter-spacing:.05em;padding:4px 10px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s;}
.hdr-link:hover{background:rgba(255,255,255,.18);color:#fff;}
.hdr-acts{margin-left:auto;display:flex;gap:6px;align-items:center;}
.hdr-btn{font-size:10px;padding:3px 10px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ── レイアウト ── */
.app{flex:1;display:flex;overflow:hidden;}

/* ── 左パネル ── */
.lpanel{width:230px;background:var(--paper2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .18s;}
.lpanel.collapsed{width:36px;}
.lp-hdr{padding:0 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;height:42px;flex-shrink:0;}
.lp-title{font-size:11px;letter-spacing:.1em;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;}
.lp-toggle{background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:2px 4px;flex-shrink:0;}
.lp-toggle:hover{color:var(--accent2);}
.lp-add{background:var(--accent);color:#fff;border:none;width:24px;height:24px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lp-add:hover{background:var(--accent2);}
.lp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.lp-tab{flex:1;font-size:10px;padding:7px 4px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .12s;}
.lp-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.lp-body{flex:1;overflow-y:auto;overflow-x:hidden;}

/* プロット一覧 */
.pli{padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:5px;}
.pli:hover{background:var(--hover);}
.pli.on{background:var(--active-bg);border-left:3px solid var(--accent);padding-left:7px;}
.pli-bd{flex:1;min-width:0;}
.pli-title{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pli-meta{font-size:9px;color:var(--muted);margin-top:1px;}
.pli-del{opacity:0;font-size:10px;color:var(--muted);cursor:pointer;padding:2px 4px;flex-shrink:0;}
.pli:hover .pli-del{opacity:.5;}
.pli-del:hover{color:var(--accent);opacity:1!important;}

/* テンプレ一覧 */
.tmpl-cat{font-size:9px;letter-spacing:.15em;color:var(--muted);padding:7px 8px 3px;border-bottom:1px solid var(--border);}
.tmpl-item{padding:6px 10px;cursor:pointer;display:flex;align-items:flex-start;gap:7px;transition:background .1s;border-bottom:1px solid rgba(212,201,176,.4);}
.tmpl-item:hover{background:var(--hover);}
.tmpl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.tmpl-texts{flex:1;min-width:0;}
.tmpl-name{font-size:11px;color:var(--ink);}
.tmpl-desc{font-size:9px;color:var(--muted);margin-top:1px;line-height:1.5;}

/* ── メイン ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ツールバー */
.tb{height:44px;background:var(--paper2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:7px;flex-shrink:0;}
.tb-title{font-size:14px;font-family:'Noto Serif JP',serif;background:none;border:none;outline:none;color:var(--ink);flex:1;min-width:0;}
.tb-title::placeholder{color:var(--muted);opacity:.4;}
.tb-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.tb-btn{font-size:10px;padding:3px 10px;border:1px solid var(--border);background:var(--paper);color:var(--muted);cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:all .12s;}
.tb-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.tb-btn.primary:hover{background:var(--accent2);border-color:var(--accent2);}
.tb-btn.on{background:var(--accent2);color:#fff;border-color:var(--accent2);}

/* フェーズバー */
.phase-bar{border-bottom:1px solid var(--border);background:var(--paper);display:flex;align-items:stretch;padding:0 12px;flex-shrink:0;overflow-x:auto;}
.phase-bar::-webkit-scrollbar{height:0;}
.ph-tab{font-size:11px;padding:7px 14px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.07em;white-space:nowrap;font-family:'Noto Serif JP',serif;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:5px;}
.ph-tab:hover{color:var(--accent2);}
.ph-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.ph-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pb-right{margin-left:auto;display:flex;align-items:center;gap:6px;padding:4px 0;flex-shrink:0;}

/* ── ボードキャンバス ── */
.canvas-wrap{flex:1;overflow:auto;position:relative;background:var(--paper);}
.canvas-wrap::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:26px 26px;opacity:.4;pointer-events:none;}
.canvas{position:relative;}

/* 空表示 */
.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);pointer-events:none;}
.empty .ei{font-size:40px;opacity:.2;}
.empty p{font-size:12px;opacity:.45;text-align:center;line-height:2;}

/* ── カード ── */
.card{
  position:absolute;width:188px;
  background:var(--paper);border:1px solid var(--border);
  box-shadow:2px 3px 10px rgba(0,0,0,.08);
  border-radius:2px;cursor:pointer;
  transition:box-shadow .15s,transform .1s;
  user-select:none;
}
.card:hover{box-shadow:3px 6px 18px rgba(0,0,0,.14);transform:translateY(-1px);}
.card.dragging{opacity:.45;transform:scale(.97);z-index:1000;}
.card-bar{height:4px;border-radius:2px 2px 0 0;}
.card-grip{position:absolute;top:7px;right:6px;color:var(--border);font-size:10px;cursor:grab;opacity:0;transition:opacity .1s;}
.card:hover .card-grip{opacity:.7;}
.card-body{padding:7px 9px 6px;}
.card-phase-tag{font-size:8px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:3px;}
.card-title{font-size:12px;line-height:1.55;font-family:'Noto Serif JP',serif;word-break:break-all;margin-bottom:3px;}
.card-summary{font-size:10px;color:var(--muted);line-height:1.7;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;margin-bottom:5px;}
.card-footer{display:flex;align-items:center;gap:3px;flex-wrap:wrap;padding-top:4px;border-top:1px solid var(--border);}
.card-tag{font-size:8px;padding:1px 4px;background:var(--paper2);border:1px solid var(--border);color:var(--muted);}

/* ── リストビュー ── */
.list-wrap{flex:1;overflow:auto;}
.list-table{width:100%;border-collapse:collapse;font-size:11px;}
.list-table th{padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);font-weight:normal;letter-spacing:.1em;font-size:9px;color:var(--muted);background:var(--paper2);position:sticky;top:0;z-index:2;}
.list-table td{padding:8px 12px;border-bottom:1px solid var(--border);}
.list-table tr{cursor:pointer;transition:background .08s;}
.list-table tr:hover td{background:var(--hover);}

/* ── モーダル共通 ── */
.overlay{position:fixed;inset:0;z-index:300;background:rgba(15,10,4,.5);display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--paper);border:1px solid var(--border);box-shadow:0 12px 40px rgba(0,0,0,.25);border-radius:2px;display:flex;flex-direction:column;}
.modal-hdr{padding:10px 16px;background:var(--ink);color:var(--paper);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.modal-hdr-title{font-size:12px;letter-spacing:.12em;flex:1;}
.modal-x{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:18px;padding:0 4px;line-height:1;}
.modal-x:hover{color:#fff;}
.modal-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;}
.modal-footer{padding:10px 16px;background:var(--paper2);border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;}
.fl{font-size:9px;letter-spacing:.18em;color:var(--muted);margin-bottom:3px;}
.fi{width:100%;padding:6px 9px;border:1px solid var(--border);background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;font-size:13px;outline:none;}
.fi:focus{border-color:var(--accent2);}
.fta{width:100%;padding:7px 9px;border:1px solid var(--border);background:var(--paper);color:var(--ink);font-family:'Noto Serif JP',serif;font-size:12px;line-height:1.9;resize:vertical;outline:none;min-height:68px;}
.fta:focus{border-color:var(--accent2);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-p{padding:5px 16px;background:var(--accent);color:#fff;border:none;cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;letter-spacing:.08em;}
.btn-p:hover{background:var(--accent2);}
.btn-s{padding:5px 12px;background:var(--paper);color:var(--muted);border:1px solid var(--border);cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;}
.btn-s:hover{border-color:var(--accent2);color:var(--accent2);}
.btn-d{padding:5px 12px;background:none;color:#a02010;border:1px solid #d0a090;cursor:pointer;font-size:11px;font-family:'Noto Sans JP',sans-serif;}
.btn-d:hover{background:#fdf0ee;}

/* カラーピッカー */
.color-row{display:flex;gap:5px;flex-wrap:wrap;}
.cc{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;}
.cc:hover{transform:scale(1.15);}
.cc.on{border-color:var(--ink);transform:scale(1.1);}

/* テンション */
.t-row{display:flex;gap:3px;margin-top:3px;}
.t-btn{width:22px;height:22px;border:1px solid var(--border);background:var(--paper);cursor:pointer;font-size:10px;color:var(--muted);transition:all .1s;}
.t-btn.on{background:var(--accent2);color:#fff;border-color:var(--accent2);}

/* 新規プロットモーダル */
.np-box{width:min(440px,96vw);}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.tg-btn{padding:8px 10px;border:1px solid var(--border);background:var(--paper);cursor:pointer;text-align:left;transition:all .12s;border-radius:1px;}
.tg-btn:hover{border-color:var(--accent2);background:var(--hover);}
.tg-btn.on{border-color:var(--accent);background:rgba(122,32,8,.05);}
.tg-name{font-size:12px;color:var(--ink);font-family:'Noto Serif JP',serif;margin-bottom:2px;}
.tg-desc{font-size:9px;color:var(--muted);line-height:1.4;}

/* フェーズ編集ポップ */
.ph-pop{position:fixed;z-index:400;background:var(--paper);border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.15);padding:10px 12px;display:none;flex-direction:column;gap:6px;min-width:190px;}
.ph-pop.show{display:flex;}

/* トースト */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-size:11px;letter-spacing:.1em;padding:8px 20px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);}

/* ── フローティングAI ── */
#faiBtn{position:fixed;bottom:22px;right:22px;z-index:1100;width:44px;height:44px;border-radius:50%;background:var(--ink);color:var(--paper);border:none;cursor:pointer;font-size:19px;box-shadow:0 4px 14px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;transition:background .15s;}
#faiBtn:hover,#faiBtn.on{background:var(--accent2);}
#faiPanel{position:fixed;z-index:1150;width:340px;min-width:240px;max-width:96vw;height:440px;min-height:240px;max-height:calc(100vh - 80px);background:var(--paper);border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.22);border-radius:3px;display:flex;flex-direction:column;overflow:hidden;bottom:76px;right:22px;}
#faiPanel.hidden{display:none;}
.fai-hdr{padding:6px 10px;background:var(--ink);color:var(--paper);display:flex;align-items:center;gap:6px;cursor:grab;user-select:none;flex-shrink:0;}
.fai-title{font-size:11px;letter-spacing:.1em;flex:1;}
.fai-x{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;}
.fai-x:hover{color:#fff;}
.fai-prov{padding:4px 8px;border-bottom:1px solid var(--border);display:flex;gap:4px;align-items:center;background:var(--paper2);flex-shrink:0;}
.fai-pb{font-size:9px;padding:2px 7px;border:1px solid var(--border);background:var(--paper);color:var(--muted);cursor:pointer;}
.fai-pb.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.fai-log{flex:1;min-height:0;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.fai-log::-webkit-scrollbar{width:4px;}
.fai-log::-webkit-scrollbar-thumb{background:var(--border);}
.fai-bub{font-size:11px;line-height:1.75;padding:5px 9px;border-radius:2px;white-space:pre-wrap;word-break:break-all;font-family:sans-serif;max-width:94%;}
.fai-bub.user{background:var(--active-bg);border:1px solid var(--border);align-self:flex-end;font-size:10px;}
.fai-bub.ai{background:#f8f4ee;border:1px solid var(--border);align-self:flex-start;}
.fai-bub.err{background:#fdf0f0;border:1px solid #f0d0d0;color:var(--accent);}
.fai-acts{padding:4px 8px;border-top:1px solid var(--border);background:var(--paper2);display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0;}
.fai-ab{font-size:9px;padding:2px 8px;border:1px solid var(--border);background:var(--paper);color:var(--muted);cursor:pointer;}
.fai-ab:hover{border-color:var(--accent2);color:var(--accent2);}
.fai-inp{padding:6px 8px;border-top:1px solid var(--border);background:var(--paper2);display:flex;gap:5px;align-items:flex-end;flex-shrink:0;}
.fai-ta{flex:1;resize:none;min-height:34px;max-height:110px;border:1px solid var(--border);background:var(--paper);padding:5px 8px;font-family:serif;font-size:12px;line-height:1.7;color:var(--ink);outline:none;overflow-y:auto;}
.fai-send{background:var(--accent2);color:#fff;border:none;padding:6px 12px;font-size:11px;cursor:pointer;align-self:stretch;white-space:nowrap;}
.fai-send:hover{background:var(--accent);}
.fai-send:disabled{opacity:.5;cursor:not-allowed;}
.fai-rz{position:absolute;bottom:0;right:0;width:18px;height:18px;cursor:se-resize;background:linear-gradient(135deg,transparent 40%,var(--border) 40%,var(--border) 60%,transparent 60%),linear-gradient(135deg,transparent 60%,var(--border) 60%,var(--border) 80%,transparent 80%);opacity:.5;}
.fai-rz:hover{opacity:1;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="hdr">
  <div class="hdr-logo">📋 プロットメーカー</div>
  <a href="index.html" class="hdr-link" target="_blank">📖 ことば辞典</a>
  <a href="craft.html" class="hdr-link" target="_blank">📓 創作ノート</a>
  <a href="emotion-map.html" class="hdr-link" target="_blank">🗺 感情地図</a>
  <div class="hdr-acts">
    <button class="hdr-btn" onclick="exportData()">💾 保存</button>
    <button class="hdr-btn" onclick="document.getElementById('importFile').click()">📂 読込</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="app">
  <!-- 左パネル -->
  <div class="lpanel" id="lpanel">
    <div class="lp-hdr">
      <span class="lp-title" id="lp-title">プロット / テンプレート</span>
      <button class="lp-toggle" id="lp-toggle" onclick="toggleLP()" title="折りたたむ">◀</button>
      <button class="lp-add" onclick="showNewPlotModal()" title="新規プロット">＋</button>
    </div>
    <div id="lp-tabs" class="lp-tabs">
      <button class="lp-tab on" onclick="switchTab('plots',this)">📋 プロット</button>
      <button class="lp-tab" onclick="switchTab('tmpl',this)">✦ テンプレ</button>
    </div>
    <div class="lp-body" id="lp-body"></div>
  </div>

  <!-- メイン -->
  <div class="main" id="mainArea">
    <!-- 空 -->
    <div id="emptyState" style="flex:1;display:flex;align-items:center;justify-content:center;">
      <div class="empty" style="position:static;">
        <div class="ei">📋</div>
        <p>「＋」で新しいプロットを作成<br>またはテンプレートからカードを追加</p>
      </div>
    </div>

    <!-- ボード -->
    <div id="boardArea" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <!-- ツールバー -->
      <div class="tb">
        <input type="text" class="tb-title" id="boardTitle" placeholder="プロットのタイトル" oninput="onTitleInput()">
        <div class="tb-sep"></div>
        <button class="tb-btn primary" onclick="addCard()">＋ カード追加</button>
        <button class="tb-btn" onclick="toggleView()" id="viewBtn">📄 リスト</button>
        <button class="tb-btn" onclick="autoLayout()">⊞ 整列</button>
        <button class="tb-btn primary" onclick="saveCurrent()">保存</button>
      </div>
      <!-- フェーズバー -->
      <div class="phase-bar" id="phaseBar">
        <div class="pb-right">
          <button class="tb-btn" onclick="addPhase()" style="font-size:9px;padding:2px 8px;">＋ フェーズ</button>
          <select id="tmplSel" style="font-size:10px;padding:3px 8px;border:1px solid var(--border);background:var(--paper2);color:var(--ink);font-family:'Noto Sans JP',sans-serif;cursor:pointer;" onchange="applyTmpl(this.value)">
            <option value="">── テンプレ適用 ──</option>
            <option value="kishoutenketsu">起承転結</option>
            <option value="johakyuu">序破急</option>
            <option value="sanmaku">三幕構成</option>
            <option value="hero">英雄の旅（5幕）</option>
            <option value="blank">空（フェーズなし）</option>
          </select>
        </div>
      </div>
      <!-- コンテンツ切替エリア -->
      <div id="boardContent" style="flex:1;overflow:hidden;display:flex;flex-direction:column;"></div>
    </div>
  </div>
</div>

<!-- カード詳細モーダル -->
<div class="overlay" id="cardModal">
  <div class="modal" style="width:min(700px,96vw);max-height:90vh;">
    <div class="modal-hdr">
      <span class="modal-hdr-title" id="cardModalTitle">📝 カードを編集</span>
      <button class="modal-x" onclick="closeCardModal()">×</button>
    </div>
    <div class="modal-body">
      <div><div class="fl">タイトル</div><input type="text" class="fi" id="cTitle" placeholder="シーン・エピソードのタイトル"></div>
      <div><div class="fl">カード色</div><div class="color-row" id="cColorRow"></div></div>
      <div><div class="fl">概要・あらすじ</div><textarea class="fta" id="cSummary" rows="3" placeholder="このカードの内容…"></textarea></div>
      <div><div class="fl">詳細・メモ</div><textarea class="fta" id="cDetail" rows="3" placeholder="伏線、セリフ、描写メモなど…"></textarea></div>
      <div class="fr2">
        <div><div class="fl">登場人物</div><input type="text" class="fi" id="cChars" placeholder="主人公、ヒロイン…"></div>
        <div><div class="fl">場所</div><input type="text" class="fi" id="cLoc" placeholder="森の中…"></div>
      </div>
      <div class="fr2">
        <div><div class="fl">時間・季節</div><input type="text" class="fi" id="cTime" placeholder="夜明け前、冬…"></div>
        <div><div class="fl">感情・雰囲気</div><input type="text" class="fi" id="cMood" placeholder="緊迫、哀愁…"></div>
      </div>
      <div class="fr2">
        <div><div class="fl">タグ（スペース区切り）</div><input type="text" class="fi" id="cTags" placeholder="クライマックス 伏線回収"></div>
        <div><div class="fl">テンション (1〜5)</div><div class="t-row" id="cTRow"></div></div>
      </div>
      <div><div class="fl">フェーズ</div><select class="fi" id="cPhase" style="font-family:'Noto Sans JP',sans-serif;font-size:12px;"></select></div>
    </div>
    <div class="modal-footer">
      <button class="btn-p" onclick="saveCard()">保存する</button>
      <button class="btn-s" onclick="closeCardModal()">閉じる</button>

</div>

<div class="overlay" id="newPlotModal">
  <div class="modal np-box">

      📋 新しいプロットを作成
      <button class="modal-x" onclick="closeModal('newPlotModal')" style="margin-left:auto;">×</button>
    </div>
    <div class="modal-body">
      <div><div class="fl">タイトル</div><input type="text" class="fi" id="npTitle" placeholder="プロットのタイトル" onkeydown="if(!event.isComposing&&event.key==='Enter')doCreatePlot()"></div>
      <div><div class="fl">テンプレート</div><div class="tmpl-grid" id="npTmplGrid"></div></div>

        <button class="btn-s" onclick="closeModal('newPlotModal')">キャンセル</button>

</div>

<!-- フェーズ編集ポップ -->
<div class="ph-pop" id="phPop">

  <input type="color" id="phPopColor" style="width:100%;height:24px;border:1px solid var(--border);cursor:pointer;padding:0 2px;">
  <div style="display:flex;gap:5px;margin-top:2px;">
    <button class="btn-p" onclick="savePhase()" style="padding:3px 12px;font-size:10px;">保存</button>
    <button class="btn-s" onclick="closePhPop()" style="padding:3px 10px;font-size:10px;">閉</button>
    <button class="btn-d" onclick="deletePhase()" style="padding:3px 10px;font-size:10px;">削除</button>
  </div>
</div>

<div class="toast" id="toast">保存しました</div>

<!-- フローティングAI -->
<button id="faiBtn" onclick="toggleFAI()">🤖</button>
<div id="faiPanel" class="hidden">
  <div class="fai-hdr" id="faiHdr">
    <span class="fai-title">🤖 AI アシスタント</span>
    <button class="fai-x" onclick="toggleFAI()">×</button>
  </div>
  <div class="fai-prov">
    <button class="fai-pb on" id="fPG" onclick="setFP('gemini')">Gemini</button>
    <button class="fai-pb" id="fPC" onclick="setFP('claude')">Claude</button>
    <span style="margin-left:auto;font-size:9px;color:var(--muted);" id="fKS">キー未設定</span>
    <button onclick="promptKey()" style="font-size:9px;padding:1px 6px;border:1px solid var(--border);background:var(--paper);color:var(--muted);cursor:pointer;">⚙</button>
  </div>
  <div class="fai-log" id="faiLog"><span style="color:#c8bfb0;font-size:11px;align-self:center;margin:auto;">AIへの質問がここに表示されます</span></div>
  <div class="fai-acts">
    <button class="fai-ab" onclick="faiCopy()">コピー</button>
    <button class="fai-ab" onclick="faiReset()">🔄 リセット</button>
  </div>
  <div class="fai-inp">
    <textarea class="fai-ta" id="faiQ" placeholder="何でも質問できます。Alt+Enterで送信。" onkeydown="if(!event.isComposing&&event.key==='Enter'&&event.altKey){event.preventDefault();faiAsk();}"></textarea>
    <button class="fai-send" id="faiSend" onclick="faiAsk()">送信<br><span style="font-size:8px;opacity:.7;">Alt+↵</span></button>
  </div>
  <div class="fai-rz" id="faiRz"></div>
</div>

<script>
// ════════════════════════════════
// データ定義
// ════════════════════════════════
let plots=[], curId=null, editCardId=null, editPhaseId=null;
let lpTab='plots', viewMode='board', lpCollapsed=false, activePh=null;
let faiOpen=false, faiProv='gemini', faiHist=[], faiKeys={gemini:'',claude:''};

const PH_COLORS=['#c4763a','#7a4a8a','#3a7a4a','#3a5a8a','#8a6a2a','#7a2030','#4a7a7a','#5a5a7a','#6a4a2a','#2a5a4a'];
const CARD_COLORS=['#f5e6d0','#fde8e8','#fffde8','#e8f0e4','#e8eaf8','#f3e8f8','#e0f4f8','#fdebd0','#d4b896','#e8a598','#c5ddb0','#a8c8e8','#c8b0d8','#b8d4c8','#e8c88a','#3a2010','#2c3e50','#4a5a3a','#6a3050','#1a3a4a'];

const TMPLS={
  kishoutenketsu:{name:'起承転結',desc:'4幕・基本の物語構成',phases:['起','承','転','結']},
  johakyuu:{name:'序破急',desc:'3幕・緩急をつけた展開',phases:['序','破','急']},
  sanmaku:{name:'三幕構成',desc:'設定・対立・解決',phases:['設定','対立・葛藤','解決']},
  hero:{name:'英雄の旅',desc:'5幕・神話の英雄構造',phases:['日常世界','冒険への召喚','試練の数々','最大の試練','帰還と変容']},
  blank:{name:'空（フリー）',desc:'フェーズなしで自由に',phases:[]}
};

// テンプレートカード
const TMPL_CARDS={
  おすすめ:[
    {name:'序章・導入',color:'#e8f0e4',desc:'物語の世界観と主人公を提示する場面。'},
    {name:'転換点',color:'#fde8e8',desc:'物語の流れが大きく変わる重要な場面。'},
    {name:'クライマックス',color:'#f5e6d0',desc:'物語の最大の盛り上がり・決戦。'},
    {name:'解決・結末',color:'#e8eaf8',desc:'全ての問題が解決し、物語が締まる場面。'},
    {name:'伏線',color:'#fffde8',desc:'後の展開への伏線を張る場面。'},
  ],
  イベント:[
    {name:'初めての出会い',color:'#fde8e8',desc:'主人公と重要人物が初めて顔を合わせる。'},
    {name:'試練・壁',color:'#f5e6d0',desc:'主人公が大きな困難に直面する。'},
    {name:'仲間との絆',color:'#e8f0e4',desc:'信頼関係が深まる出来事。'},
    {name:'裏切り・衝撃の真実',color:'#fde8e8',desc:'読者・主人公を驚かせる展開。'},
    {name:'決意・覚悟',color:'#e8eaf8',desc:'主人公が腹を決め行動に移る。'},
    {name:'別れ',color:'#f3e8f8',desc:'重要な人物やものとの別れ。'},
  ],
  世界観:[
    {name:'世界の説明',color:'#e0f4f8',desc:'この世界のルール・背景を読者に伝える場面。'},
    {name:'勢力・組織の登場',color:'#fdebd0',desc:'重要な組織や勢力が明らかになる。'},
    {name:'歴史・過去の回想',color:'#e8c88a',desc:'世界の過去や歴史が明かされる。'},
    {name:'異文化・異世界の描写',color:'#e8f0e4',desc:'主人公たちとは異なる文化・場所の描写。'},
  ],
  感情:[
    {name:'喜び・成功',color:'#fffde8',desc:'主人公が何かを成し遂げた喜びの場面。'},
    {name:'悲しみ・喪失',color:'#e8eaf8',desc:'大切なものを失う悲しみ。'},
    {name:'怒り・葛藤',color:'#fde8e8',desc:'主人公の怒りや心の葛藤が爆発する。'},
    {name:'恐れ・絶望',color:'#f3e8f8',desc:'どうすることもできない恐怖や絶望感。'},
    {name:'愛・情熱',color:'#fce4ec',desc:'誰かへの愛情や強い思いが表れる場面。'},
    {name:'成長・変化',color:'#e8f0e4',desc:'主人公の内面的な変化・成長が見える。'},
  ]
};

// ── ユーティリティ ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg='保存しました'){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function cp(){return plots.find(p=>p.id===curId);}

// ── 保存・読込 ──
function persist(){localStorage.setItem('plotmaker_v1',JSON.stringify({plots,faiKeys}));}
function load(){
  try{const d=JSON.parse(localStorage.getItem('plotmaker_v1')||'{}');
    if(d.plots)plots=d.plots;if(d.faiKeys)faiKeys={...faiKeys,...d.faiKeys};}
  catch{plots=[];}
}
function exportData(){
  const a=document.createElement('a');const dt=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({plots},null,2)],{type:'application/json'}));
  a.download=`プロット_${dt}.json`;a.click();URL.revokeObjectURL(a.href);
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
    if(d.plots){plots=confirm(`${d.plots.length}件を読込。追加しますか？\nキャンセル→上書き`)?[...plots,...d.plots]:d.plots;
    persist();renderLP();if(plots.length)openPlot(plots[0].id);toast('読み込みました');}}catch{alert('読み込み失敗');}};
  r.readAsText(f);e.target.value='';
}

// ── 左パネル ──
function toggleLP(){
  lpCollapsed=!lpCollapsed;
  const lp=document.getElementById('lpanel');
  lp.classList.toggle('collapsed',lpCollapsed);
  document.getElementById('lp-toggle').textContent=lpCollapsed?'▶':'◀';
  ['lp-title','lp-tabs','lp-body'].forEach(id=>{document.getElementById(id).style.display=lpCollapsed?'none':'';});
}
function switchTab(tab,btn){
  lpTab=tab;
  document.querySelectorAll('.lp-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');renderLP();
}
function renderLP(){
  const body=document.getElementById('lp-body');
  lpTab==='plots'?renderPlotList(body):renderTmplList(body);
}
function renderPlotList(body){
  if(!plots.length){body.innerHTML='<div style="padding:16px 12px;font-size:11px;color:var(--muted);text-align:center;line-height:2;">プロットなし<br>＋ で追加</div>';return;}
  body.innerHTML=plots.map(p=>`
    <div class="pli${p.id===curId?' on':''}" onclick="openPlot('${p.id}')">
      <div class="pli-bd">
        <div class="pli-title">${esc(p.title||'（無題）')}</div>
        <div class="pli-meta">${p.cards?.length||0}カード · ${p.phases?.map(ph=>ph.name).join('・')||'フェーズなし'}</div>
      </div>
      <span class="pli-del" onclick="event.stopPropagation();deletePlot('${p.id}')">×</span>
    </div>`).join('');
}
function renderTmplList(body){
  body.innerHTML=Object.entries(TMPL_CARDS).map(([cat,items])=>`
    <div class="tmpl-cat">✦ ${esc(cat)}</div>
    ${items.map(t=>`
      <div class="tmpl-item" onclick="addFromTmpl(${JSON.stringify(t.name)},${JSON.stringify(t.color)},${JSON.stringify(t.desc)})">
        <span class="tmpl-dot" style="background:${t.color||'#d4c9b0'}"></span>
        <div class="tmpl-texts">
          <div class="tmpl-name">${esc(t.name)}</div>
          <div class="tmpl-desc">${esc(t.desc)}</div>
        </div>
      </div>`).join('')}
  `).join('');
}
function addFromTmpl(name,color,desc){
  const p=cp();if(!p){toast('先にプロットを選んでください');return;}
  const pos=nextPos(p);
  p.cards.push({id:uid(),phaseId:p.phases[0]?.id||null,title:name,summary:desc,detail:'',chars:'',location:'',time:'',mood:'',tags:'',tension:0,color,x:pos.x,y:pos.y});
  persist();renderBoard();toast('カードを追加しました');
}

// ── プロット管理 ──
let selTmpl='kishoutenketsu';
function showNewPlotModal(){
  selTmpl='kishoutenketsu';
  document.getElementById('npTitle').value='';
  const grid=document.getElementById('npTmplGrid');
  grid.innerHTML=Object.entries(TMPLS).map(([k,v])=>`
    <button class="tg-btn${k===selTmpl?' on':''}" onclick="pickTmpl('${k}',this)">
      <div class="tg-name">${v.name}</div><div class="tg-desc">${v.desc}</div>
    </button>`).join('');
  document.getElementById('newPlotModal').classList.add('show');
  setTimeout(()=>document.getElementById('npTitle').focus(),60);
}
function pickTmpl(k,btn){selTmpl=k;document.querySelectorAll('#npTmplGrid .tg-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function doCreatePlot(){
  const title=document.getElementById('npTitle').value.trim()||'新しいプロット';
  const tmpl=TMPLS[selTmpl]||TMPLS.blank;
  const phases=tmpl.phases.map((name,i)=>({id:uid(),name,color:PH_COLORS[i%PH_COLORS.length]}));
  const plot={id:uid(),title,phases,cards:[]};
  plots.unshift(plot);persist();renderLP();closeModal('newPlotModal');openPlot(plot.id);
}
function deletePlot(id){
  if(!confirm('このプロットを削除しますか？'))return;
  plots=plots.filter(p=>p.id!==id);
  if(curId===id){curId=null;showEmpty();}
  persist();renderLP();
}
function openPlot(id){
  curId=id;activePh=null;
  const p=plots.find(x=>x.id===id);if(!p)return;
  document.getElementById('emptyState').style.display='none';
  const ba=document.getElementById('boardArea');ba.style.display='flex';
  document.getElementById('boardTitle').value=p.title||'';
  renderLP();renderPhBar();renderBoard();
}
function showEmpty(){document.getElementById('emptyState').style.display='flex';document.getElementById('boardArea').style.display='none';}
function onTitleInput(){const p=cp();if(p)p.title=document.getElementById('boardTitle').value;}
function saveCurrent(){const p=cp();if(p)p.title=document.getElementById('boardTitle').value.trim()||'（無題）';persist();renderLP();toast();}

// ── フェーズ ──
function renderPhBar(){
  const p=cp();if(!p)return;
  const bar=document.getElementById('phaseBar');
  const right=bar.querySelector('.pb-right');
  bar.innerHTML='';
  // 全体タブ
  const all=document.createElement('button');
  all.className='ph-tab'+(!activePh?' on':'');
  all.textContent='全体';
  all.onclick=()=>{activePh=null;renderPhBar();renderBoard();};
  bar.appendChild(all);
  // 各フェーズタブ
  p.phases.forEach(ph=>{
    const tab=document.createElement('button');
    tab.className='ph-tab'+(activePh===ph.id?' on':'');
    if(activePh===ph.id){tab.style.color=ph.color;tab.style.borderBottomColor=ph.color;}
    tab.innerHTML=`<span class="ph-dot" style="background:${ph.color}"></span>${esc(ph.name)}`;
    tab.onclick=()=>{activePh=ph.id;renderPhBar();renderBoard();};
    tab.ondblclick=(e)=>{e.stopPropagation();openPhEdit(ph.id,tab);};
    bar.appendChild(tab);
  });
  bar.appendChild(right);
}
function addPhase(){
  const p=cp();if(!p)return;
  p.phases.push({id:uid(),name:'フェーズ'+(p.phases.length+1),color:PH_COLORS[p.phases.length%PH_COLORS.length]});
  persist();renderPhBar();renderBoard();
}
function applyTmpl(val){
  if(!val)return;const tmpl=TMPLS[val];if(!tmpl)return;const p=cp();if(!p)return;
  if(p.cards.length>0&&!confirm('フェーズ構成を変更します。続けますか？')){document.getElementById('tmplSel').value='';return;}
  p.phases=tmpl.phases.map((name,i)=>({id:uid(),name,color:PH_COLORS[i%PH_COLORS.length]}));
  p.cards.forEach(c=>c.phaseId=p.phases[0]?.id||null);
  activePh=null;persist();renderPhBar();renderBoard();document.getElementById('tmplSel').value='';
}
function openPhEdit(phId,tabEl){
  editPhaseId=phId;const p=cp();const ph=p?.phases.find(x=>x.id===phId);if(!ph)return;
  document.getElementById('phPopName').value=ph.name;
  document.getElementById('phPopColor').value=ph.color;
  const pop=document.getElementById('phPop');
  const r=tabEl.getBoundingClientRect();
  pop.style.top=(r.bottom+4)+'px';pop.style.left=r.left+'px';
  pop.classList.add('show');setTimeout(()=>document.getElementById('phPopName').select(),60);
}
function savePhase(){
  const p=cp();const ph=p?.phases.find(x=>x.id===editPhaseId);
  if(ph){ph.name=document.getElementById('phPopName').value.trim()||ph.name;ph.color=document.getElementById('phPopColor').value;}
  persist();renderPhBar();renderBoard();closePhPop();
}
function deletePhase(){
  const p=cp();if(!p||p.phases.length<=1){alert('最低1つのフェーズが必要です');return;}
  if(!confirm('このフェーズを削除しますか？（カードは先頭フェーズへ移動）'))return;
  const first=p.phases.find(ph=>ph.id!==editPhaseId);
  p.cards.filter(c=>c.phaseId===editPhaseId).forEach(c=>c.phaseId=first.id);
  p.phases=p.phases.filter(ph=>ph.id!==editPhaseId);
  if(activePh===editPhaseId)activePh=null;
  persist();renderPhBar();renderBoard();closePhPop();
}
function closePhPop(){document.getElementById('phPop').classList.remove('show');}

// ── ボード描画 ──
const CW=188,CH=155,GAP=18,SX=28,SY=36;
function nextPos(p){
  for(let i=0;i<300;i++){const col=i%5,row=Math.floor(i/5);const x=SX+col*(CW+GAP),y=SY+row*(CH+GAP);
    if(!p.cards.some(c=>Math.abs((c.x||0)-x)<CW*.6&&Math.abs((c.y||0)-y)<CH*.6))return{x,y};}
  return{x:SX,y:SY};
}
function renderBoard(){
  const p=cp();if(!p)return;
  const bc=document.getElementById('boardContent');
  viewMode==='list'?renderList(p,bc):renderBoardView(p,bc);
}
function renderBoardView(p,bc){
  bc.innerHTML='<div class="canvas-wrap" id="cwrap"><div class="canvas" id="cnv"></div></div>';
  const wrap=document.getElementById('cwrap');
  const cnv=document.getElementById('cnv');
  const cards=activePh?p.cards.filter(c=>c.phaseId===activePh):p.cards;
  if(!cards.length){
    cnv.innerHTML='<div class="empty"><div class="ei">📋</div><p>「＋ カード追加」またはテンプレートパネルから<br>カードを追加してください</p></div>';
    cnv.style.minWidth='100%';cnv.style.minHeight='100%';
  } else {
    cards.forEach(c=>{
      const ph=p.phases.find(ph=>ph.id===c.phaseId);
      const bar=c.color||(ph?.color)||'#d4c9b0';
      const tags=(c.tags||'').split(/\s+/).filter(Boolean).slice(0,3);
      const el=document.createElement('div');
      el.className='card';el.dataset.id=c.id;
      el.style.left=(c.x||SX)+'px';el.style.top=(c.y||SY)+'px';
      el.innerHTML=`
        <div class="card-bar" style="background:${bar}"></div>
        <div class="card-grip">⠿</div>
        <div class="card-body">
          ${ph?`<div class="card-phase-tag"><span style="width:6px;height:6px;border-radius:50%;background:${ph.color};display:inline-block;"></span>${esc(ph.name)}</div>`:''}
          <div class="card-title">${esc(c.title||'（無題）')}</div>
          ${c.summary?`<div class="card-summary">${esc(c.summary)}</div>`:'<div class="card-summary" style="color:#c8bfb0;">概要なし</div>'}
          <div class="card-footer">
            ${tags.map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}
            ${c.chars?`<span class="card-tag">👤${esc(c.chars.slice(0,8))}</span>`:''}
          </div>
        </div>`;
      el.addEventListener('click',e=>{if(!e._dragged)openCardModal(c.id);});
      makeDraggable(el,c,p,cnv);
      cnv.appendChild(el);
    });
    updateCanvasSize(cnv,cards);
  }
  // ダブルクリックで新規カード
  cnv.addEventListener('dblclick',e=>{
    if(e.target!==cnv&&!e.target.classList.contains('canvas'))return;
    const r=cnv.getBoundingClientRect();
    addCardAt(e.clientX-r.left,e.clientY-r.top);
  });
}
function updateCanvasSize(cnv,cards){
  let mx=800,my=600;
  cards.forEach(c=>{mx=Math.max(mx,(c.x||0)+CW+60);my=Math.max(my,(c.y||0)+CH+60);});
  cnv.style.width=mx+'px';cnv.style.height=my+'px';
}
function makeDraggable(el,c,p,cnv){
  let sx,sy,cx0,cy0,moved=false;
  el.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    sx=e.clientX;sy=e.clientY;cx0=c.x||SX;cy0=c.y||SY;moved=false;
    const mm=ev=>{
      const dx=ev.clientX-sx,dy=ev.clientY-sy;
      if(!moved&&(Math.abs(dx)>4||Math.abs(dy)>4)){moved=true;el.classList.add('dragging');}
      if(moved){c.x=Math.max(0,cx0+dx);c.y=Math.max(0,cy0+dy);el.style.left=c.x+'px';el.style.top=c.y+'px';updateCanvasSize(cnv,p.cards);}
    };
    const mu=()=>{
      document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);
      if(moved){el.classList.remove('dragging');el._dragged=true;setTimeout(()=>el._dragged=false,100);persist();}
    };
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

function renderList(p,bc){
  const phases=activePh?p.phases.filter(ph=>ph.id===activePh):p.phases;
  bc.innerHTML='<div class="list-wrap"><table class="list-table"><thead><tr>'
    +['#','タイトル','概要','登場人物','フェーズ'].map(h=>`<th>${h}</th>`).join('')
    +'</tr></thead><tbody>'
    +phases.flatMap(ph=>{
      const cards=p.cards.filter(c=>c.phaseId===ph.id);
      return cards.map((c,i)=>`
        <tr onclick="openCardModal('${c.id}')">
          <td>${i+1}</td>
          <td style="font-family:'Noto Serif JP',serif;">${esc(c.title||'（無題）')}</td>
          <td style="color:var(--muted);max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.summary||'')}</td>
          <td style="color:var(--muted);">${esc(c.chars||'')}</td>
          <td><span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;"><span style="width:6px;height:6px;border-radius:50%;background:${ph.color};flex-shrink:0;"></span>${esc(ph.name)}</span></td>
        </tr>`);
    }).join('')
    +'</tbody></table></div>';
}

function toggleView(){
  viewMode=viewMode==='board'?'list':'board';
  document.getElementById('viewBtn').textContent=viewMode==='board'?'📄 リスト':'📋 ボード';
  renderBoard();
}
function autoLayout(){
  const p=cp();if(!p)return;
  p.cards.forEach((c,i)=>{const col=i%5,row=Math.floor(i/5);c.x=SX+col*(CW+GAP);c.y=SY+row*(CH+GAP);});
  persist();renderBoard();toast('整列しました');
}

// ── カード操作 ──
function addCard(){const p=cp();if(!p){toast('先にプロットを選んでください');return;}addCardAt(null,null);}
function addCardAt(x,y){
  const p=cp();if(!p)return;
  const pos=(x===null)?nextPos(p):{x,y};
  const c={id:uid(),phaseId:activePh||p.phases[0]?.id||null,title:'',summary:'',detail:'',chars:'',location:'',time:'',mood:'',tags:'',tension:0,color:'',x:pos.x,y:pos.y};
  p.cards.push(c);persist();renderBoard();setTimeout(()=>openCardModal(c.id),60);
}

function openCardModal(cardId){
  const p=cp();if(!p)return;
  const c=p.cards.find(x=>x.id===cardId);if(!c)return;
  editCardId=cardId;
  document.getElementById('cardModalTitle').textContent=c.title?`📝 ${c.title}`:'📝 カードを編集';
  document.getElementById('cTitle').value=c.title||'';
  document.getElementById('cSummary').value=c.summary||'';
  document.getElementById('cDetail').value=c.detail||'';
  document.getElementById('cChars').value=c.chars||'';
  document.getElementById('cLoc').value=c.location||'';
  document.getElementById('cTime').value=c.time||'';
  document.getElementById('cMood').value=c.mood||'';
  document.getElementById('cTags').value=c.tags||'';
  // カラー
  const cr=document.getElementById('cColorRow');
  cr.dataset.sel=c.color||'';
  cr.innerHTML=CARD_COLORS.map(col=>`<div class="cc${c.color===col?' on':''}" style="background:${col}" onclick="pickColor('${col}',this)"></div>`).join('')
    +`<div class="cc" style="background:linear-gradient(135deg,#ddd 50%,#fff 50%);border:1px solid var(--border);" onclick="pickColor('',null)" title="フェーズ色">↺</div>`;
  // テンション
  const tr=document.getElementById('cTRow');tr.dataset.v=c.tension||0;
  tr.innerHTML=[1,2,3,4,5].map(v=>`<button class="t-btn${(c.tension||0)>=v?' on':''}" data-v="${v}" onclick="pickT(${v},this)">${v}</button>`).join('');
  // フェーズ
  document.getElementById('cPhase').innerHTML='<option value="">（フェーズなし）</option>'
    +p.phases.map(ph=>`<option value="${ph.id}"${c.phaseId===ph.id?' selected':''}>${esc(ph.name)}</option>`).join('');
  document.getElementById('cardModal').classList.add('show');
  setTimeout(()=>document.getElementById('cTitle').focus(),60);
}
function pickColor(col,el){
  document.querySelectorAll('#cColorRow .cc').forEach(c=>c.classList.remove('on'));
  if(el)el.classList.add('on');
  document.getElementById('cColorRow').dataset.sel=col;
}
function pickT(v,btn){
  const tr=btn.parentElement;const cur=parseInt(tr.dataset.v||0);const nv=cur===v?0:v;
  tr.dataset.v=nv;tr.querySelectorAll('.t-btn').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.v)<=nv));
}
function saveCard(){
  const p=cp();if(!p)return;const c=p.cards.find(x=>x.id===editCardId);if(!c)return;
  c.title=document.getElementById('cTitle').value.trim();
  c.summary=document.getElementById('cSummary').value.trim();
  c.detail=document.getElementById('cDetail').value.trim();
  c.chars=document.getElementById('cChars').value.trim();
  c.location=document.getElementById('cLoc').value.trim();
  c.time=document.getElementById('cTime').value.trim();
  c.mood=document.getElementById('cMood').value.trim();
  c.tags=document.getElementById('cTags').value.trim();
  c.phaseId=document.getElementById('cPhase').value||null;
  c.color=document.getElementById('cColorRow').dataset.sel||'';
  c.tension=parseInt(document.getElementById('cTRow').dataset.v||0);
  persist();closeCardModal();renderBoard();toast();
}
function closeCardModal(){document.getElementById('cardModal').classList.remove('show');editCardId=null;}
function deleteCard(){
  if(!confirm('このカードを削除しますか？'))return;
  const p=cp();if(!p)return;
  p.cards=p.cards.filter(c=>c.id!==editCardId);
  persist();closeCardModal();renderBoard();
}

// ── モーダル外クリック ──
document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('mousedown',e=>{el._md=e.target===el;});
  el.addEventListener('click',e=>{if(el._md&&e.target===el)el.classList.remove('show');});
});
document.addEventListener('click',e=>{
  const pop=document.getElementById('phPop');
  if(pop.classList.contains('show')&&!pop.contains(e.target)&&!e.target.closest('.ph-tab'))closePhPop();
});

// ── フローティングAI ──
function toggleFAI(){
  faiOpen=!faiOpen;
  document.getElementById('faiPanel').classList.toggle('hidden',!faiOpen);
  document.getElementById('faiBtn').classList.toggle('on',faiOpen);
  if(faiOpen){initFAIDrag();updateKS();document.getElementById('faiQ').focus();}
}
function setFP(p){faiProv=p;document.getElementById('fPG').classList.toggle('on',p==='gemini');document.getElementById('fPC').classList.toggle('on',p==='claude');updateKS();}
function updateKS(){const k=faiProv==='gemini'?faiKeys.gemini:faiKeys.claude;const el=document.getElementById('fKS');el.textContent=k?'✓ キー設定済':'キー未設定';el.style.color=k?'var(--accent2)':'var(--muted)';}
function promptKey(){const label=faiProv==='gemini'?'Gemini':'Claude';const cur=faiProv==='gemini'?faiKeys.gemini:faiKeys.claude;const k=prompt(`${label} APIキー:`,cur||'');if(k===null)return;if(faiProv==='gemini')faiKeys.gemini=k.trim();else faiKeys.claude=k.trim();persist();updateKS();}
async function faiAsk(){
  const q=document.getElementById('faiQ').value.trim();if(!q)return;
  const key=faiProv==='gemini'?faiKeys.gemini:faiKeys.claude;if(!key){promptKey();return;}
  document.getElementById('faiQ').value='';addBub('user',q);faiHist.push({role:'user',content:q});
  const btn=document.getElementById('faiSend');btn.disabled=true;
  try{
    let ans='';
    if(faiProv==='gemini'){
      const msgs=faiHist.slice(-10).map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]}));
      const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:msgs})});
      const d=await r.json();if(d.error)throw new Error(d.error.message);ans=d.candidates?.[0]?.content?.parts?.[0]?.text||'（回答なし）';
    }else{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1024,messages:faiHist.slice(-10).filter(m=>m.role!=='system')})});
      const d=await r.json();if(d.error)throw new Error(d.error.message);ans=d.content?.[0]?.text||'（回答なし）';
    }
    addBub('ai',ans);faiHist.push({role:'assistant',content:ans});
  }catch(err){addBub('err','⚠ '+err.message);}
  finally{btn.disabled=false;}
}
function addBub(type,text){const log=document.getElementById('faiLog');log.querySelectorAll('span').forEach(s=>s.remove());const el=document.createElement('div');el.className='fai-bub '+type;el.textContent=text;log.appendChild(el);log.scrollTop=log.scrollHeight;}
function faiCopy(){const b=document.querySelectorAll('#faiLog .fai-bub.ai');if(!b.length)return;navigator.clipboard.writeText(b[b.length-1].textContent).then(()=>toast('コピーしました'));}
function faiReset(){faiHist=[];document.getElementById('faiLog').innerHTML='<span style="color:#c8bfb0;font-size:11px;align-self:center;margin:auto;">AIへの質問がここに表示されます</span>';}
let faiDI=false;
function initFAIDrag(){
  if(faiDI)return;faiDI=true;
  const panel=document.getElementById('faiPanel'),hdr=document.getElementById('faiHdr'),rz=document.getElementById('faiRz');
  let ox,oy,px,py,rw,rh,rx,ry;
  hdr.addEventListener('mousedown',e=>{ox=e.clientX;oy=e.clientY;const r=panel.getBoundingClientRect();px=r.left;py=r.top;const mm=ev=>{panel.style.left=(px+ev.clientX-ox)+'px';panel.style.top=(py+ev.clientY-oy)+'px';panel.style.right='auto';panel.style.bottom='auto';};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',()=>document.removeEventListener('mousemove',mm),{once:true});});
  rz.addEventListener('mousedown',e=>{e.stopPropagation();const r=panel.getBoundingClientRect();rw=r.width;rh=r.height;rx=e.clientX;ry=e.clientY;const mm=ev=>{panel.style.width=Math.max(240,rw+ev.clientX-rx)+'px';panel.style.height=Math.max(240,rh+ev.clientY-ry)+'px';};document.addEventListener('mousemove',mm);document.addEventListener('mouseup',()=>document.removeEventListener('mousemove',mm),{once:true});});
}

// 初期化
load();renderLP();if(plots.length)openPlot(plots[0].id);
